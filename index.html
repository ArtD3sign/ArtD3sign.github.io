<!DOCTYPE html>
   <html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <!--=============== FAVICON ===============-->
      <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">

      <!--=============== REMIXICONS ===============-->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.css">

      <!--=============== SWIPER CSS ===============-->
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11.0.0/swiper-bundle.min.css">

      <!--=============== CSS ===============-->
      <link rel="stylesheet" href="styles.css">

      <title>AQP Garage</title>
   </head>
   <body>
      
      <!--==================== HEADER ====================-->
      <header class="header" id="header">
         <nav class="nav container">
            <a href="#" class="nav__logo"><img src="https://firebasestorage.googleapis.com/v0/b/aqp-garage-87fa4.appspot.com/o/logo.png?alt=media&token=d3020222-362a-42d9-961d-73a2206d6092" alt=""></a>

            <div class="nav__menu" id="nav-menu">
               <ul class="nav__list">
                  <li class="nav__item">
                     <a href="#" class="nav__link">Home</a>
                  </li>

                  <li class="nav__item">
                     <a href="#" class="nav__link">Men</a>
                  </li>

                  <li class="nav__item">
                     <a href="#" class="nav__link">Women</a>
                  </li>

                  <li class="nav__item">
                     <a href="#" class="nav__link">Bags</a>
                  </li>

                  <li class="nav__item">
                     <a href="#" class="nav__link">Community</a>
                  </li>
               </ul>
               <!-- Close button -->
               <div class="nav__close" id="nav-close">
                  <i class="ri-close-line"></i>
               </div>
            </div>

            <div class="nav__actions">
               <i class="ri-heart-3-line"></i>
               <i class="ri-shopping-cart-line"></i>
               <!-- Toggle button -->
               <div class="nav__toggle" id="nav-toggle">
                  <i class="ri-menu-line"></i> 
               </div>
            </div>      

         </nav>
      </header>

      <!--==================== MAIN ====================-->
      <main class="main">
         <!--==================== HOME ====================-->
         <section class="home">
            <div class="home__container container">
               <div class="home__content">
                  <div class="home__circle">
                     <div class="home__subcircle"></div>
                     <h1 class="home__title"><img src="https://firebasestorage.googleapis.com/v0/b/aqp-garage-87fa4.appspot.com/o/aqp.png?alt=media&token=4d9db312-a72d-4d2b-9811-b46c8be3f25e" alt=""></h1>
                  </div>  

                  <div class="home__swiper swiper">
                     <div class="swiper-wrapper">
                        <article class="home__article swiper-slide">
                           <img src="assets/img/clothing-1.png" alt="image" class="home__img">

                           <h2 class="home__product">Core Hoddie</h2>
                           <h3 class="home__price">$125</h3>
                        </article>

                        <article class="home__article swiper-slide">
                           <img src="assets/img/clothing-2.png" alt="image" class="home__img">

                           <h2 class="home__product">Stylish Backpack</h2>
                           <h3 class="home__price">$115</h3>
                        </article>

                        <article class="home__article swiper-slide">
                           <img src="assets/img/clothing-3.png" alt="image" class="home__img">

                           <h2 class="home__product">Premiere Pants</h2>
                           <h3 class="home__price">$125</h3>
                        </article>

                        <article class="home__article swiper-slide">
                           <img src="assets/img/clothing-4.png" alt="image" class="home__img">

                           <h2 class="home__product">Black Shorts</h2>
                           <h3 class="home__price">$75</h3>
                        </article>

                        <article class="home__article swiper-slide">
                           <img src="assets/img/clothing-5.png" alt="image" class="home__img">

                           <h2 class="home__product">Cool T-Shirt</h2>
                           <h3 class="home__price">$65</h3>
                        </article>
                        <article class="home__article swiper-slide">
                           <img src="assets/img/clothing-6.png" alt="image" class="home__img">

                           <h2 class="home__product">Cool T-Shirt</h2>
                           <h3 class="home__price">$65</h3>
                        </article>
                        <article class="home__article swiper-slide">
                           <img src="assets/img/clothing-7.png" alt="image" class="home__img">

                           <h2 class="home__product">Cool T-Shirt</h2>
                           <h3 class="home__price">$65</h3>
                        </article>
                         <article class="home__article swiper-slide">
                           <img src="assets/img/clothing-8.png" alt="image" class="home__img">

                           <h2 class="home__product">Cool T-Shirt</h2>
                           <h3 class="home__price">$65</h3>
                        </article>
                     </div>
                  </div>
                  <!-- Navigation buttons -->
                 <div class="swiper-button-prev">
                    <i class="ri-arrow-left-line"></i>
                 </div>
                 <div class="swiper-button-next">
                    <i class="ri-arrow-right-line"></i>
                 </div>
               </div> 

               <footer class="home__footer">
                  <div class="home__languages">
                     ES | EN
                  </div>

                  <div class="home__social">
                     <a href="https://www.facebook.com/" target="_blank" class="home__social-link">
                        <i class="ri-facebook-circle-line"></i>
                     </a>

                     <a href="https://www.instagram.com/" target="_blank" class="home__social-link">
                        <i class="ri-instagram-line"></i>
                     </a>

                     <a href="https://www.tiktok.com/" target="_blank" class="home__social-link">
                        <i class="ri-tiktok-fill"></i>
                     </a>
                  </div>
               </footer>
            </div>
         </section>
      </main>

      <!--=============== SCROLLREVEAL ===============-->
      <script src="https://unpkg.com/scrollreveal"></script>

      <!--=============== SWIPER JS ===============-->
      <script src="https://cdn.jsdelivr.net/npm/swiper@11.0.0/swiper-bundle.min.js"></script>

      <!--=============== MAIN JS ===============-->
      <script src="main.js"></script>
   </body>
</html>
